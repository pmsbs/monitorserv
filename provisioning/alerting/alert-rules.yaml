apiVersion: 1
groups:
  - orgId: 1
    name: service_alerts
    folder: Service Alerts
    interval: 1m
    rules:
      - uid: alert-saobentodosapucai
        title: Site Down - saobentodosapucai.sp.gov.br
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: probe_success{instance="https://saobentodosapucai.sp.gov.br"} == 0
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: Service {{ $labels.instance }} is down
          description: "{{ $labels.instance }} has been unreachable for more than 3 minutes"
        labels:
          severity: critical
          team: ti
        isPaused: false

